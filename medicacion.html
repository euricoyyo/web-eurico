<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Medicación - Eurico</title>
    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --border-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
            background-color: var(--primary);
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background-color: var(--primary-dark);
        }

        h1 {
            color: var(--text-main);
            text-align: center;
            margin: 10px 0 5px 0;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .chart-wrapper {
            position: relative;
            margin: auto;
            height: 380px;
            width: 100%;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 1.4rem; }
            .chart-wrapper { height: 300px; }
            .header-actions { flex-direction: column; gap: 15px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <a href="index.html" class="back-btn">⬅️ Volver al Panel</a>
    </div>
    
    <h1>📊 Registro Gráfico de Medicación</h1>
    <p class="subtitle">Visualización de las dosis administradas a Eurico durante los últimos 7 días.</p>
    
    <div class="chart-wrapper">
        <canvas id="medicationChart"></canvas>
    </div>
</div>

<!-- CORRECCIÓN 1: Enlace completo y ultrarrápido a la librería oficial de Chart.js -->
<script src="https://jsdelivr.net" defer></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Breve espera técnica para dar tiempo a que cargue el script de arriba
    setTimeout(() => {
        if (typeof Chart === 'undefined') {
            console.error("La librería Chart.js no se ha podido cargar a tiempo.");
            return;
        }

        // 1. Recuperar el registro histórico real compartido desde index.html
        const history = JSON.parse(localStorage.getItem('med_history') || '[]');
        
        // 2. Generar automáticamente las fechas de los últimos 7 días para el eje X
        const labels = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            // CORRECCIÓN 2: Extraemos el string limpio 'AAAA-MM-DD' usando [0]
            labels.push(d.toISOString().split('T')[0]);
        }

        // 3. Filtrar y contar de forma rápida cuántas tomas se hicieron por día para cada fármaco
        const pimoData = labels.map(date => history.filter(h => h.date === date && h.medication && h.medication.includes('pimobendan')).length);
        const furoData = labels.map(date => history.filter(h => h.date === date && h.medication && h.medication.includes('furosemida')).length);
        const espiData = labels.map(date => history.filter(h => h.date === date && h.medication && h.medication.includes('espironolactona')).length);

        // 4. Configurar y pintar la gráfica con la librería Chart.js
        const ctx = document.getElementById('medicationChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar', 
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '💔 Pimobendan',
                        data: pimoData,
                        backgroundColor: '#e74c3c',
                        borderRadius: 4
                    },
                    {
                        label: '💧 Furosemida',
                        data: furoData,
                        backgroundColor: '#3498db',
                        borderRadius: 4
                    },
                    {
                        label: '💊 Espironolactona',
                        data: espiData,
                        backgroundColor: '#2ecc71',
                        borderRadius: 4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { 
                            stepSize: 1,
                            precision: 0 
                        },
                        title: { display: true, text: 'Tomas Realizadas' }
                    },
                    x: { 
                        title: { display: true, text: 'Fecha' } 
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { boxWidth: 15, padding: 15 }
                    }
                }
            }
        });
    }, 200); // Tiempo de espera óptimo
});
</script>

</body>
</html>
