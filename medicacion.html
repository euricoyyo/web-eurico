<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Medicación - Eurico</title>
    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --border-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            text-align: center;
        }

        .header-actions {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
            background-color: var(--primary);
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background-color: var(--primary-dark);
        }

        h1 {
            color: var(--text-main);
            margin: 10px 0 5px 0;
            font-size: 1.8rem;
        }

        .subtitle {
            color: var(--text-light);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .info-box {
            background-color: #e8f4fd;
            border-left: 5px solid var(--primary);
            padding: 15px;
            border-radius: 4px;
            display: inline-block;
            text-align: left;
            max-width: 90%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <a href="index.html" class="back-btn">⬅️ Volver al Panel</a>
    </div>
    
    <h1>📊 Registro Gráfico de Medicación</h1>
    <p class="subtitle">Sección en mantenimiento técnico.</p>
    
    <div class="info-box">
        <p style="margin: 0; font-weight: bold; color: #2c3e50;">🐾 Panel de Control Activo</p>
        <p style="margin: 5px 0 0 0; font-size: 0.9rem; color: #555;">
            Las tomas diarias se siguen registrando de forma segura bajo tu contraseña en la página principal.
        </p>
    </div>
</div>

</body>
</html>
