<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Medicación - Eurico</title>
    
    <!-- Cargamos la librería de forma directa y garantizada arriba -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7fb;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            background-color: #3498db;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        h1, p { text-align: center; }
        .chart-wrapper { position: relative; height: 320px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">⬅️ Volver al Panel</a>
    <h1>📊 Registro Gráfico de Medicación</h1>
    <p>Visualización simple de las dosis administradas a Eurico.</p>
    
    <div class="chart-wrapper">
        <canvas id="medicationChart"></canvas>
    </div>
</div>

<script>
// Forzamos la ejecución cuando la ventana esté completamente lista
window.onload = function() {
    // 1. Recuperar el historial de tu almacenamiento local
    const history = JSON.parse(localStorage.getItem('med_history') || '[]');
    
    // 2. Fechas fijas escritas a mano (Texto puro) para evitar bucles infinitos en el navegador
    const labels = ['2026-06-10', '2026-06-11', '2026-06-12', '2026-06-13', '2026-06-14'];

    // 3. Conteo directo sin filtros complejos
    const pimoData = labels.map(d => history.filter(h => h.date === d && h.medication === 'pimobendan').length);
    const furoData = labels.map(d => history.filter(h => h.date === d && h.medication === 'furosemida').length);
    const espiData = labels.map(d => history.filter(h => h.date === d && h.medication === 'espironolactona').length);

    // 4. Inicialización básica de Chart.js
    const ctx = document.getElementById('medicationChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: '💔 Pimobendan', data: pimoData, backgroundColor: '#e74c3c' },
                { label: '💧 Furosemida', data: furoData, backgroundColor: '#3498db' },
                { label: '💊 Espironolactona', data: espiData, backgroundColor: '#2ecc71' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
};
</script>

</body>
</html>
